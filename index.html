<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            font-size: 16px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>Guess the Number</h1>
    <div>
        <label for="guessInput">Guess a number between 1 and 100:</label>
        <input type="number" id="guessInput" min="1" max="100" placeholder="1-100" title="Enter a number between 1 and 100">
        <button onclick="checkGuess()">Guess</button>
        <p id="message"></p>
    </div>
    <script>
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        function checkGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            const message = document.getElementById('message');
            if (isNaN(guess) || guess < 1 || guess > 100) {
                message.textContent = "Please enter a number between 1 and 100.";
                return;
            }
            if (guess === secretNumber) {
                message.textContent = "Congratulations! You guessed it!";
                message.style.color = "green";
            } else if (guess < secretNumber) {
                message.textContent = "Too low!";
                message.style.color = "orange";
            } else {
                message.textContent = "Too high!";
                message.style.color = "red";
            }
        }
    </script>
</body>

</html>
